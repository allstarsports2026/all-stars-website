name: CI + Deploy

on:
  push:
    branches: [main]

concurrency:
  group: church-website-deploy
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install pnpm (respects package.json "packageManager")
      - uses: pnpm/action-setup@v4

      # Now Node can safely enable pnpm caching
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            git fetch --all
            git reset --hard origin/main
            command -v pnpm >/dev/null 2>&1 || npm i -g pnpm
            command -v pm2  >/dev/null 2>&1 || npm i -g pm2
            pnpm install --frozen-lockfile || pnpm install
            pnpm build
            pm2 reload "${{ secrets.PM2_APP_NAME }}" || pm2 start pnpm --name "${{ secrets.PM2_APP_NAME }}" -- start
            pm2 save
